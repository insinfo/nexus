<div class="rf-controls card shadow-sm border-0">
  <button type="button" class="btn btn-light" (click)="zoomIn()" title="Zoom in">
    <i class="ph ph-plus"></i>
  </button>
  <button type="button" class="btn btn-light" (click)="zoomOut()" title="Zoom out">
    <i class="ph ph-minus"></i>
  </button>
  <button type="button" class="btn btn-light" (click)="fitView()" title="Enquadrar grafo">
    <i class="ph ph-corners-out"></i>
  </button>
</div>
