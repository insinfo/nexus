<div class="builder-selector">
    <div class="builder-selector__field" *ngIf="services.isNotEmpty">
        <label class="builder-selector__label">Servico</label>
        <select #serviceSelect class="form-select builder-selector__input" (change)="serviceChanged(serviceSelect.value ?? '')">
            <option *ngFor="let item of services" [value]="item.id" [selected]="item.id == selectedServiceId">
                {{ item.nome }}
            </option>
        </select>
    </div>
    <div class="builder-selector__field" *ngIf="versions.isNotEmpty">
        <label class="builder-selector__label">Versao</label>
        <select #versionSelect class="form-select builder-selector__input" (change)="versionChanged(versionSelect.value ?? '')">
            <option *ngFor="let item of versions" [value]="item.id" [selected]="item.id == selectedVersionId">
                v{{ item.versao }} · {{ item.status.label }}
            </option>
        </select>
    </div>
    <div class="builder-selector__field" *ngIf="selectedVersion != null && selectedVersion!.fluxos.isNotEmpty">
        <label class="builder-selector__label">Fluxo</label>
        <select #flowSelect class="form-select builder-selector__input" (change)="flowChanged(flowSelect.value ?? '')">
            <option *ngFor="let item of selectedVersion!.fluxos" [value]="item.id" [selected]="item.id == selectedFlowId">
                {{ item.chave }}
            </option>
        </select>
    </div>
</div>
