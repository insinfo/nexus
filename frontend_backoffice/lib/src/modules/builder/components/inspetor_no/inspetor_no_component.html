<div class="inspector-shell">
    <div class="inspector-shell__body" *ngIf="!temSelecao">
        <div class="inspector-empty-state">
            <i class="ph ph-selection inspector-empty-state__icon"></i>
            <div class="inspector-empty-state__title">Selecione um elemento</div>
            <div class="inspector-empty-state__text">Escolha um no ou uma aresta no canvas para editar propriedades e comportamento.</div>
        </div>
    </div>

    <div class="inspector-shell__body inspector-shell__body--form" *ngIf="no != null">
        <section class="inspector-group">
            <div class="inspector-group__label">ID do no</div>
            <div class="inspector-readonly">{{ no!.id }}</div>
        </section>

        <section class="inspector-group">
            <div class="inspector-group__label">Tipo</div>
            <div class="inspector-readonly">
                <span class="inspector-badge">{{ tipoNoLabel }}</span>
            </div>
        </section>

        <section class="inspector-group">
            <label class="inspector-group__label">Rotulo / nome</label>
            <input type="text" class="form-control inspector-input" [(ngModel)]="no!.dados.rotulo" (input)="notifyChange()">
        </section>

        <section class="inspector-group inspector-hint" *ngIf="no!.tipo == TipoNoFluxo.apresentacao">
            Configuracoes de apresentacao serao exibidas aqui conforme os campos do bloco forem evoluindo.
        </section>

        <section class="inspector-group" *ngIf="no!.tipo == TipoNoFluxo.condicao">
            <label class="inspector-group__label">Expressao</label>
            <textarea class="form-control inspector-input inspector-textarea" rows="4" [(ngModel)]="dadosCond!.expressao" (input)="notifyChange()"></textarea>
        </section>

        <button type="button" class="btn btn-outline-danger inspector-remove" (click)="remove()">
            <i class="ph ph-trash me-2"></i>
            Remover no
        </button>
    </div>

    <div class="inspector-shell__body inspector-shell__body--form" *ngIf="aresta != null">
        <section class="inspector-group">
            <div class="inspector-group__label">Aresta</div>
            <div class="inspector-readonly">{{ aresta!.id }}</div>
        </section>

        <section class="inspector-group">
            <label class="inspector-group__label">Rotulo</label>
            <input type="text" class="form-control inspector-input" [(ngModel)]="aresta!.rotulo" (input)="notifyChange()">
        </section>

        <button type="button" class="btn btn-outline-danger inspector-remove" (click)="remove()">
            <i class="ph ph-trash me-2"></i>
            Remover aresta
        </button>
    </div>
</div>
