<!-- Main navbar -->
<div class="navbar navbar-dark navbar-expand-lg navbar-static border-bottom border-bottom-white border-opacity-10">
	<div class="container-fluid">
		<div class="d-flex d-lg-none me-2">
			<button type="button" class="navbar-toggler sidebar-mobile-main-toggle rounded-pill" (click)="toggleSidebarMobile()">
				<i class="ph-list"></i>
			</button>
		</div>

		<div class="navbar-brand flex-1 flex-lg-0">
			<a [routerLink]="RoutePaths.dashboard.toUrl()" class="d-inline-flex align-items-center">
				<img src="assets/images/logo_icon.svg" alt="">
				<span class="d-none d-sm-inline-block ms-3 text-white fw-bold fs-5">Nexus Backoffice</span>
			</a>
		</div>

		<ul class="nav flex-row">
			<li class="nav-item d-lg-none">
				<a href="#navbar_search" class="navbar-nav-link navbar-nav-link-icon rounded-pill" [attr.data-bs-toggle]="'collapse'">
					<i class="ph-magnifying-glass"></i>
				</a>
			</li>

			<li class="nav-item nav-item-dropdown-lg dropdown ms-lg-2">
				<a href="#" class="navbar-nav-link align-items-center rounded-pill p-1" [attr.data-bs-toggle]="'dropdown'">
					<div class="status-indicator-container">
						<img src="assets/images/demo/users/face11.jpg" class="w-32px h-32px rounded-pill" alt="">
						<span class="status-indicator bg-success"></span>
					</div>
					<span class="d-none d-lg-inline-block mx-lg-2">Backoffice User</span>
				</a>
			</li>
		</ul>
	</div>
</div>
<!-- /main navbar -->

<!-- Page content -->
<div class="page-content">

	<!-- Main sidebar -->
	<div
		class="sidebar sidebar-dark sidebar-main sidebar-expand-lg"
		[class.sidebar-main-resized]="isSidebarResized"
		[class.sidebar-main-unfold]="isSidebarUnfold"
		[class.sidebar-mobile-expanded]="isSidebarMobileExpanded"
		(mouseenter)="onSidebarMouseEnter()"
		(mouseleave)="onSidebarMouseLeave()">

		<!-- Sidebar content -->
		<div class="sidebar-content">

			<!-- Sidebar header -->
			<div class="sidebar-section">
				<div class="sidebar-section-body d-flex justify-content-center">
					<h5 class="sidebar-resize-hide flex-grow-1 my-auto">Navegação</h5>

					<div>
						<button type="button" class="btn btn-flat-white btn-icon btn-sm rounded-pill border-transparent sidebar-control sidebar-main-resize d-none d-lg-inline-flex" (click)="toggleSidebarResize()">
							<i class="ph-arrows-left-right"></i>
						</button>

						<button type="button" class="btn btn-flat-white btn-icon btn-sm rounded-pill border-transparent sidebar-mobile-main-toggle d-lg-none" (click)="toggleSidebarMobile()">
							<i class="ph-x"></i>
						</button>
					</div>
				</div>
			</div>
			<!-- /sidebar header -->

			<!-- Main navigation -->
			<div class="sidebar-section">
				<ul class="nav nav-sidebar" [attr.data-nav-type]="'accordion'">

					<!-- Main -->
					<li class="nav-item-header pt-0">
						<div class="text-uppercase fs-sm lh-sm opacity-50 sidebar-resize-hide">Seções</div>
						<i class="ph-dots-three sidebar-resize-show"></i>
					</li>

					<li class="nav-item">
						<a [routerLink]="RoutePaths.dashboard.toUrl()" class="nav-link cursor-pointer" [class.active]="isRouteActive('dashboard')">
							<i class="ph-house"></i>
							<span>Dashboard & Serviços</span>
						</a>
					</li>
					<li class="nav-item">
						<a [routerLink]="RoutePaths.builder.toUrl()" class="nav-link cursor-pointer" [class.active]="isRouteActive('builder')">
							<i class="ph-tree-structure"></i>
							<span>Builder de Fluxos</span>
						</a>
					</li>
					<li class="nav-item">
						<a [routerLink]="RoutePaths.operacao.toUrl()" class="nav-link cursor-pointer" [class.active]="isRouteActive('operacao')">
							<i class="ph-briefcase"></i>
							<span>Operação Institucional</span>
						</a>
					</li>
					<li class="nav-item">
						<a [routerLink]="RoutePaths.editorial.toUrl()" class="nav-link cursor-pointer" [class.active]="isRouteActive('editorial')">
							<i class="ph-newspaper"></i>
							<span>Editorial de Conteúdo</span>
						</a>
					</li>
				</ul>
			</div>
			<!-- /main navigation -->

		</div>
		<!-- /sidebar content -->
		
	</div>
	<!-- /main sidebar -->


	<!-- Main content -->
	<div class="content-wrapper">

		<!-- Inner content -->
		<div class="content-inner">
			<!-- Content area -->
			<div class="content">
				<router-outlet [routes]="PagesRoutes.allPrivate"></router-outlet>
			</div>
			<!-- /content area -->

			<!-- Footer -->
			<div *ngIf="exibirRodape" class="navbar navbar-sm navbar-footer border-top">
				<div class="container-fluid">
					<span>&copy; {{ todayYear }} <a href="#">Nexus Backoffice</a></span>
				</div>
			</div>
			<!-- /footer -->

		</div>
		<!-- /inner content -->

	</div>
	<!-- /main content -->

</div>
<!-- /page content -->
