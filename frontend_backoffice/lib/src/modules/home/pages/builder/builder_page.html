<div class="builder-shell">
    <section class="builder-surface">
        <div class="builder-surface__tabs">
            <button type="button" class="builder-tab">Detalhes do servico</button>
            <button type="button" class="builder-tab is-active">Formulario</button>
            <div class="builder-surface__actions">
                <button type="button" class="btn btn-outline-primary btn-sm" [disabled]="validationLoading" (click)="validarFluxo()">
                    <span *ngIf="validationLoading" class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
                    <i *ngIf="!validationLoading" class="ph ph-check-circle me-2"></i>
                    Validar
                </button>
                <button type="button" class="btn btn-light btn-sm" [disabled]="saveDraftLoading" (click)="salvarRascunho()">
                    <span *ngIf="saveDraftLoading" class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
                    <i *ngIf="!saveDraftLoading" class="ph ph-floppy-disk me-2"></i>
                    Salvar
                </button>
            </div>
        </div>

        <div class="builder-surface__filters">
            <seletor-servico 
                [services]="services"
                [versions]="builderVersions"
                [selectedVersion]="versaoSelecionada"
                [selectedServiceId]="selectedBuilderServiceId"
                [selectedVersionId]="selectedBuilderVersionId"
                [selectedFlowId]="selectedBuilderFlowId"
                (onServiceChange)="onBuilderServiceChanged($event)"
                (onVersionChange)="onBuilderVersionChanged($event)"
                (onFlowChange)="onBuilderFlowChanged($event)">
            </seletor-servico>
        </div>

        <div class="builder-workspace">
            <div class="builder-workspace__canvas">
                <canvas-fluxo 
                    *ngIf="fluxoEmEdicao != null"
                    [nodes]="builderCanvasNodes"
                    [edges]="builderCanvasEdges"
                    (onAddNode)="adicionarNo($event)"
                    (onNodesChange)="handleNodesChanged($event)"
                    (onEdgesChange)="handleEdgesChanged($event)"
                    (onSelectionChange)="handleCanvasSelectionChanged($event)"
                    (onNodeDoubleClick)="handleNodeDoubleClick($event)"
                    (onEdgeDoubleClick)="handleEdgeDoubleClick($event)">
                </canvas-fluxo>

                <div *ngIf="builderLoading" class="builder-empty-state">
                    <div class="spinner-border text-primary mb-3"></div>
                    <div class="builder-empty-state__title">Carregando editor</div>
                    <div class="builder-empty-state__text">Preparando o fluxo e as configuracoes da versao selecionada.</div>
                </div>

                <div *ngIf="!builderLoading && fluxoEmEdicao == null" class="builder-empty-state">
                    <i class="ph ph-selection-all builder-empty-state__icon"></i>
                    <div class="builder-empty-state__title">Nenhum fluxo selecionado</div>
                    <div class="builder-empty-state__text">Escolha servico, versao e fluxo para abrir o editor visual.</div>
                </div>
            </div>

            <div
                *ngIf="temElementoSelecionado"
                class="builder-workspace__backdrop"
                (click)="fecharPainelLateral()"></div>

            <aside *ngIf="temElementoSelecionado" class="builder-workspace__inspector">
                <div class="builder-workspace__inspector-header">
                    <div>
                        <div class="builder-workspace__inspector-eyebrow">Painel lateral</div>
                        <h6 class="builder-workspace__inspector-title">Propriedades</h6>
                    </div>
                    <button type="button" class="builder-workspace__inspector-close" (click)="fecharPainelLateral()">
                        <i class="ph ph-x"></i>
                    </button>
                </div>
                <inspetor-no 
                    [no]="noSelecionadoBuilder"
                    [aresta]="arestaSelecionadaBuilder"
                    (onChange)="handleNodeDataChanged()"
                    (onRemove)="removerElementoSelecionado()">
                </inspetor-no>
            </aside>
        </div>
    </section>
</div>
